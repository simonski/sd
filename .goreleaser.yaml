version: 2

project_name: respec

before:
  hooks:
    - go mod tidy

builds:
  - id: respec
    main: ./cmd/respec
    binary: respec
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: respec-archive
    formats: [tar.gz]
    files:
      - none*

checksum:
  name_template: checksums.txt

brews:
  - name: respec
    homepage: https://github.com/simonski/respec
    description: Spec-driven wrapper for agentic programming CLIs
    license: MIT
    repository:
      owner: simonski
      name: homebrew-tap
      branch: main
    directory: Formula
    commit_author:
      name: respec-release-bot
      email: 223556219+Copilot@users.noreply.github.com
    test: |
      system "#{bin}/respec", "help"

release:
  github:
    owner: simonski
    name: respec

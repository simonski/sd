name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run CI-equivalent checks via Makefile
        run: make test
